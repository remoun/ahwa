app = 'ahwa'
primary_region = 'iad'

[build]
  dockerfile = 'packaging/docker/Dockerfile'

[env]
  AHWA_DATA_DIR = '/data'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = 'ahwa_data'
  destination = '/data'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
