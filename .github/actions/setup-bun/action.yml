# SPDX-License-Identifier: AGPL-3.0-or-later
name: Setup Bun
description: >
  Installs the Bun version pinned in .bun-version at the repo root.
  Single source of truth shared with packaging/docker/Dockerfile (via
  --build-arg) and packaging/yunohost/scripts/_common.sh (via cat).
  Bumping .bun-version updates every deployment path.

runs:
  using: composite
  steps:
    - id: bunver
      shell: bash
      run: |
        set -euo pipefail
        if [ ! -f .bun-version ]; then
          echo "::error::.bun-version is missing at the repo root"
          exit 1
        fi
        version=$(tr -d '[:space:]' < .bun-version)
        echo "version=$version" >> "$GITHUB_OUTPUT"

    - uses: oven-sh/setup-bun@v2
      with:
        bun-version: ${{ steps.bunver.outputs.version }}
