# SPDX-License-Identifier: AGPL-3.0-or-later
#
# release-please opens (and maintains) a "Release PR" on main that bumps
# the version + updates CHANGELOG.md based on conventional-commit
# subjects since the last release. Merging that PR cuts a tag + GitHub
# release, which produces the tarball the YunoHost package pins against.
#
# Why a PR-gated release rather than tag-on-every-push: the YNH catalog
# autoupdate bot files a sha256-bump PR for every new release, so we want
# releases to mean "we intend to ship this" — not "main moved." The PR is
# the gate; everything else is mechanical.
name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          # `simple` = just bumps a version file, no language-specific
          # publishing. The tag + GitHub release are what we want for
          # YNH consumption.
          release-type: simple
