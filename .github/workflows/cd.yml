# SPDX-License-Identifier: AGPL-3.0-or-later
name: CD

# Branch protection on main requires CI's 4 checks to pass before any
# commit can land here, so by the time this fires the commit is already
# known-good. No need for a workflow_run chain.
on:
  push:
    branches: [main]

concurrency:
  group: cd-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: production
      url: https://ahwa.app

    steps:
      - uses: actions/checkout@v6

      - uses: superfly/flyctl-actions/setup-flyctl@1.6

      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  # API-level smoke test. Verifies the deployed ahwa.app can actually
  # complete a deliberation against the real LLM provider — the class
  # of bug unit tests can't catch because they mock the LLM (wrong
  # model ID, stale API key, provider outage). Uses the internal
  # _smoke council (1 persona, 1 round, no synthesis, ~$0.005/run) so
  # cost is negligible even at high deploy cadence.
  smoke-api:
    runs-on: ubuntu-latest
    needs: deploy

    env:
      BASE_URL: https://ahwa.app
      COUNCIL_ID: _smoke
      TIMEOUT_SECONDS: 180

    steps:
      - name: Create smoke-test table
        id: create
        run: |
          response=$(curl -fsS -X POST "$BASE_URL/api/tables" \
            -H "Content-Type: application/json" \
            --data '{"dilemma":"Smoke test: does the deliberation loop work end-to-end?","councilId":"'"$COUNCIL_ID"'"}')
          echo "tableId=$(echo "$response" | jq -r .tableId)" >> "$GITHUB_OUTPUT"
          echo "partyId=$(echo "$response" | jq -r .partyId)" >> "$GITHUB_OUTPUT"
          echo "token=$(echo "$response" | jq -r .token)" >> "$GITHUB_OUTPUT"

      - name: Run the deliberation via SSE
        env:
          TABLE_ID: ${{ steps.create.outputs.tableId }}
          PARTY_ID: ${{ steps.create.outputs.partyId }}
          TOKEN: ${{ steps.create.outputs.token }}
        run: |
          # Holding the SSE connection open is what keeps the
          # orchestrator running — disconnecting mid-stream triggers the
          # between-rounds abort check. --max-time is a ceiling, not a
          # target; the stream closes naturally on table_closed.
          curl -fsS -N --max-time "$TIMEOUT_SECONDS" \
            "$BASE_URL/t/$TABLE_ID?party=$PARTY_ID&token=$TOKEN" \
            > /tmp/sse.log || echo "SSE stream ended (may be normal on table_closed)"
          tail -20 /tmp/sse.log

      - name: Verify the table completed
        env:
          TABLE_ID: ${{ steps.create.outputs.tableId }}
        run: |
          response=$(curl -fsS "$BASE_URL/api/tables/$TABLE_ID")
          status=$(echo "$response" | jq -r .status)
          echo "Final status: $status"
          echo "$response" | jq .
          if [ "$status" != "completed" ]; then
            echo "::error::API smoke test failed. Table $TABLE_ID ended in status '$status'."
            exit 1
          fi

  # UI-level smoke test. Drives the real home page → table view flow via
  # Playwright against the deployed ahwa.app. Catches bugs the API-only
  # smoke can't see (broken reactive rendering, script errors, SSE token
  # delivery to the browser). Uses the default council so the full user
  # experience is exercised (~$0.05/run, still comfortably inside spend cap).
  smoke-ui:
    runs-on: ubuntu-latest
    needs: deploy

    env:
      BASE_URL: https://ahwa.app

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-bun

      - run: bun install --frozen-lockfile

      - run: bunx playwright install chromium --with-deps

      - run: bun run test:e2e:smoke

      - if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-smoke-report
          path: playwright-report/
          retention-days: 7
