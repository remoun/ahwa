name: CD

# Branch protection on main requires CI's 4 checks to pass before any
# commit can land here, so by the time this fires the commit is already
# known-good. No need for a workflow_run chain.
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    concurrency:
      group: cd-main
      cancel-in-progress: false

    environment:
      name: production
      url: https://ahwa.app

    steps:
      - uses: actions/checkout@v6

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
