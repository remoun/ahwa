name: CD

# Chain off CI: deploy to Fly only if the CI workflow succeeded on the
# same commit. This avoids the "red main, broken prod" failure mode of
# firing deploy + CI in parallel.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    concurrency:
      group: cd-main
      cancel-in-progress: false

    environment:
      name: production
      url: https://ahwa.app

    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
