name: CD

# Branch protection on main requires CI's 4 checks + PR Preview's smoke
# jobs to pass before any commit can land here, so by the time this
# fires the commit is already known-good. No need for a workflow_run
# chain, and no post-deploy smoke — that work happened pre-merge on
# the PR preview (see preview.yml).
on:
  push:
    branches: [main]

concurrency:
  group: cd-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: production
      url: https://ahwa.app

    steps:
      - uses: actions/checkout@v6

      - uses: superfly/flyctl-actions/setup-flyctl@1.6

      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
