name: CI

on:
  # PRs only. Branch protection requires these checks to pass before a
  # PR can merge to main, so re-running on the main push would duplicate
  # the same checks that just passed.
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-bun

      - run: bun install --frozen-lockfile

      # bun run lint chains js + bash + yunohost linters. Only lint:js runs
      # here — lint:bash and lint:yunohost have their own jobs in
      # .github/workflows/yunohost.yml with the tools they need.
      - run: bun run lint:js

      - run: bun test

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-bun

      - run: bun install --frozen-lockfile

      - run: bun run build

      - uses: actions/upload-artifact@v7
        with:
          name: build
          path: build/

  e2e:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-bun

      - run: bun install --frozen-lockfile

      - run: bun run build

      - run: bunx playwright install chromium --with-deps

      - run: bun run test:e2e

      - if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
