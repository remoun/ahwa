# SPDX-License-Identifier: AGPL-3.0-or-later
name: CI

on:
  pull_request:
  # Also run on main pushes so the README CI badge (which is pinned to
  # ?branch=main) reflects the actual health of main. Branch protection
  # already gates merges, so this is a duplicate of the PR run — the
  # ~1m of duplicated CI time is the cost of an honest badge.
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-bun

      - run: bun install --frozen-lockfile

      - run: bun run lint

      - run: bun test

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-bun

      - run: bun install --frozen-lockfile

      - run: bun run build

      - uses: actions/upload-artifact@v7
        with:
          name: build
          path: build/

  e2e:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-bun

      - run: bun install --frozen-lockfile

      - run: bun run build

      - run: bunx playwright install chromium --with-deps

      - run: bun run test:e2e

      - if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
