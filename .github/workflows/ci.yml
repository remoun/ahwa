# SPDX-License-Identifier: AGPL-3.0-or-later
name: CI

on:
  # PRs only. Branch protection requires these checks to pass before a
  # PR can merge to main, so re-running on the main push would duplicate
  # the same checks that just passed.
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.11'

      - run: bun install --frozen-lockfile

      - run: bun run lint

      - run: bun test

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.11'

      - run: bun install --frozen-lockfile

      - run: bun run build

      - uses: actions/upload-artifact@v7
        with:
          name: build
          path: build/

  e2e:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.11'

      - run: bun install --frozen-lockfile

      - run: bun run build

      - run: bunx playwright install chromium --with-deps

      - run: bun run test:e2e

      - if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
