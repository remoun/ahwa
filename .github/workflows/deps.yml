# SPDX-License-Identifier: AGPL-3.0-or-later
name: Dependabot Autofix

# Dependabot's npm ecosystem sometimes bumps package.json without
# regenerating bun.lock, which breaks CI's --frozen-lockfile install.
# This workflow fires on pushes to dependabot/** branches that touch
# the manifest or lockfile, regenerates bun.lock, and commits the
# result back to the branch.
#
# We trigger on `push` (not `pull_request_target`) so the workflow
# only ever appears on Dependabot's branches — non-dependabot PRs
# never get a "skipped" autofix row in their checks list.
# `bun install --ignore-scripts` keeps Dependabot (or anyone
# impersonating it) from running arbitrary postinstall code with the
# write token.
#
# Caveat: pushes made with the default GITHUB_TOKEN do not re-trigger
# pull_request workflows (GitHub's anti-loop protection). If CI was
# failing before this autofix, close and reopen the PR to rerun the
# checks. Alternatively, set a DEPENDABOT_AUTOFIX_TOKEN secret with a
# PAT that has `repo` scope and CI will retrigger automatically.

on:
  push:
    branches:
      - 'dependabot/**'
    paths:
      - 'package.json'
      - 'bun.lock'

permissions:
  contents: write

jobs:
  regen-lockfile:
    # Belt-and-suspenders: the branch filter already restricts this to
    # dependabot/** branches, but if a human with write access ever
    # pushes such a branch by hand, the actor check makes the autofix
    # skip rather than silently rewrite their lockfile.
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
          token: ${{ secrets.DEPENDABOT_AUTOFIX_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: ./.github/actions/setup-bun

      - run: bun install --ignore-scripts

      - name: Commit regenerated lockfile
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if git diff --quiet bun.lock; then
            echo "bun.lock unchanged; nothing to commit"
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add bun.lock
          git commit -m "chore: regenerate bun.lock"
          git push origin "HEAD:${BRANCH}"
