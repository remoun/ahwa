# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Builds a "ready-to-run" tarball (build/ + package.json + bun.lock +
# .bun-version) and attaches it to the GitHub release as an asset. The
# YunoHost package pins to this asset's URL, so installs become
# "untar + bun install --production" — no `bun run build` on a 1GB-RAM
# LXC container, which used to take ~2-3 min.
#
# release-please creates the GitHub release as a DRAFT (configured in
# release-please-config.json), which fires the `release: created` event
# (drafts don't fire `published`). This workflow attaches the asset to
# the draft, then publishes it. Why drafts: GitHub now refuses asset
# uploads to published releases ("Cannot upload assets to an immutable
# release") — so the asset has to land before publish.
#
# IMPORTANT: a draft release has no git tag yet — GitHub creates the
# tag when the draft is published. So this workflow checks out the
# release's targetCommitish (the SHA the tag WILL point at), not the
# tag itself.
#
# workflow_dispatch is the manual escape hatch (rebuild an asset on an
# existing draft if this workflow itself was buggy when the release
# was first cut).
name: release-assets

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build assets for (e.g. v0.2.1)'
        required: true

permissions:
  contents: write

jobs:
  build-and-attach:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve target commit
        id: target
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          set -euo pipefail
          # For drafts, the git tag doesn't exist yet, so we fetch the
          # targetCommitish (the SHA the tag WILL point at on publish).
          # GH_REPO lets gh work without a git repo on disk — this step
          # runs before checkout.
          sha=$(gh release view "$TAG" --json targetCommitish --jq '.targetCommitish')
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.target.outputs.sha }}

      - uses: ./.github/actions/setup-bun

      - run: bun install --frozen-lockfile
      - run: bun run build

      - name: Pack the runnable tarball
        env:
          TAG: ${{ steps.target.outputs.tag }}
        run: |
          set -euo pipefail
          # Wrap files in an ahwa-VERSION/ directory to match the
          # GitHub source-archive convention. YNH's ynh_setup_source
          # defaults to in_subdir=true (strip one leading dir on
          # extract); a flat tarball without a wrapper triggers it to
          # eat 'build/' as the wrapper, losing all top-level files.
          dir="ahwa-${TAG#v}"
          mkdir "$dir"
          cp -r build/ "$dir/"
          cp package.json bun.lock .bun-version "$dir/"

          name="ahwa-build-${TAG}.tar.gz"
          # The tarball contains everything an installer needs to:
          #   1. bun install --production --frozen-lockfile
          #   2. systemd-run build/index.js
          # No source tree, no devDeps, no .git. Lockfile + bun-version
          # ensure the prod install is reproducible.
          tar -czf "$name" "$dir"
          ls -lh "$name"
          shasum -a 256 "$name"

      - name: Attach asset to the draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.target.outputs.tag }}
        run: |
          set -euo pipefail
          gh release upload "$TAG" "ahwa-build-${TAG}.tar.gz" --clobber
          # Leave the release as a draft. Manual publish via the GitHub
          # UI (or `gh release edit "$TAG" --draft=false`) is the gate
          # for going live — gives a chance to eyeball release notes +
          # confirm the asset attached as expected before downstream
          # consumers (the YNH catalog autoupdate bot, ahwa_ynh) see it.
          # Publishing creates the actual git tag at targetCommitish.
