# SPDX-License-Identifier: AGPL-3.0-or-later
name: PR Preview

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
  FLY_REGION: iad
  FLY_ORG: personal
  # fly-pr-review-apps names preview apps pr-{N}-{owner}-{app_from_fly_toml}.
  # Reconstructing the URL here keeps it as a single workflow-level
  # constant both smoke jobs reference.
  BASE_URL: https://pr-${{ github.event.number }}-${{ github.repository_owner }}-ahwa.fly.dev

jobs:
  preview:
    runs-on: ubuntu-latest

    # Only one deploy at a time per PR
    concurrency:
      group: pr-${{ github.event.number }}

    # Expose the preview URL in the GitHub UI
    environment:
      name: pr-${{ github.event.number }}
      url: ${{ env.BASE_URL }}

    steps:
      - uses: actions/checkout@v6

      - name: Deploy preview app
        uses: superfly/fly-pr-review-apps@1.6.0
        with:
          config: fly.toml
          vmsize: shared-cpu-1x
          memory: 256
          # PR preview apps don't inherit secrets from production — Fly
          # has no cross-app secret store. OPENROUTER_API_KEY costs real
          # money per request, so it stays in GitHub Secrets.
          #
          # AHWA_SHARE_SECRET just needs to be stable across preview
          # restarts (otherwise Fly's auto-stop cycle invalidates share
          # links mid-testing). It's hardcoded here intentionally:
          # previews have no real users and no valuable data, so secret
          # strength buys nothing that a constant doesn't. NEVER reuse
          # this value in production.
          # AHWA_PUBLIC_DEMO=1 makes the preview behave like ahwa.app:
          # `/` renders the landing page (once #29 lands), the
          # `/api/demo/tables` endpoint serves anonymous traffic, and
          # the TTL cleanup sweep runs hourly. The low daily cap keeps a
          # runaway PR test from burning OpenRouter credit.
          secrets: |
            OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
            AHWA_SHARE_SECRET=preview-only-not-a-real-secret
            AHWA_PUBLIC_DEMO=1
            AHWA_DEMO_DAILY_TOKEN_CAP=50000

  # fly-pr-review-apps' deploy step returns once the machine is created
  # and DNS is verified — it does NOT wait for the app inside to bind a
  # port and pass health checks. Bun cold start + Drizzle migrations on
  # a fresh SQLite file routinely take 15-30s, so the smoke jobs can hit
  # "Couldn't connect" if they fire too soon. This gate polls the
  # preview's root URL until it serves a 2xx, capping at ~2 minutes.
  wait-for-preview:
    runs-on: ubuntu-latest
    needs: preview
    if: github.event.action != 'closed'
    steps:
      - name: Poll preview URL until reachable
        run: |
          for i in $(seq 1 60); do
            if curl -fsS --max-time 5 -o /dev/null "$BASE_URL/"; then
              echo "Preview responded on attempt ${i}"
              exit 0
            fi
            echo "Attempt ${i}: not ready yet, retrying in 2s"
            sleep 2
          done
          echo "::error::Preview at $BASE_URL never responded within ~2 minutes"
          exit 1

  # Gate the merge on smoke tests. These exercise the deliberation loop
  # against the real LLM provider — the class of bug unit tests can't
  # catch because they mock the LLM (wrong model ID, stale API key,
  # provider outage, broken UI rendering, SSE buffering). Required
  # status checks in the branch-protection ruleset.

  smoke-api:
    runs-on: ubuntu-latest
    needs: wait-for-preview
    # PR close tears down the preview app; skip smoke on that event.
    if: github.event.action != 'closed'

    env:
      COUNCIL_ID: _smoke
      TIMEOUT_SECONDS: 180

    steps:
      - name: Create smoke-test table
        id: create
        run: |
          response=$(curl -fsS -X POST "$BASE_URL/api/tables" \
            -H "Content-Type: application/json" \
            --data '{"dilemma":"Smoke test: does the deliberation loop work end-to-end?","councilId":"'"$COUNCIL_ID"'"}')
          echo "tableId=$(echo "$response" | jq -r .tableId)" >> "$GITHUB_OUTPUT"
          echo "partyId=$(echo "$response" | jq -r .partyId)" >> "$GITHUB_OUTPUT"
          echo "token=$(echo "$response" | jq -r .token)" >> "$GITHUB_OUTPUT"

      - name: Run the deliberation via SSE
        env:
          TABLE_ID: ${{ steps.create.outputs.tableId }}
          PARTY_ID: ${{ steps.create.outputs.partyId }}
          TOKEN: ${{ steps.create.outputs.token }}
        run: |
          # Holding the SSE connection open is what keeps the orchestrator
          # running — disconnecting mid-stream triggers the between-rounds
          # abort check. --max-time is a ceiling, not a target.
          curl -fsS -N --max-time "$TIMEOUT_SECONDS" \
            "$BASE_URL/t/$TABLE_ID?party=$PARTY_ID&token=$TOKEN" \
            > /tmp/sse.log || echo "SSE stream ended (may be normal on table_closed)"
          tail -20 /tmp/sse.log

      - name: Verify the table completed
        env:
          TABLE_ID: ${{ steps.create.outputs.tableId }}
        run: |
          response=$(curl -fsS "$BASE_URL/api/tables/$TABLE_ID")
          status=$(echo "$response" | jq -r .status)
          echo "Final status: $status"
          echo "$response" | jq .
          if [ "$status" != "completed" ]; then
            echo "::error::API smoke failed. Table $TABLE_ID ended in status '$status'."
            exit 1
          fi

  smoke-ui:
    runs-on: ubuntu-latest
    needs: wait-for-preview
    if: github.event.action != 'closed'

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-bun

      - run: bun install --frozen-lockfile

      - run: bunx playwright install chromium --with-deps

      - run: bun run test:e2e:smoke

      - if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-smoke-report
          path: playwright-report/
          retention-days: 7
