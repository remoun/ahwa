# SPDX-License-Identifier: AGPL-3.0-or-later
name: Smoke

# Runs after a successful CD deploy. Verifies the deployed ahwa.app can
# actually complete a deliberation against the real LLM provider — the
# class of bug unit tests can't catch because they mock the LLM (e.g.
# wrong model ID, stale API key, provider outage). Costs ~$0.005 per
# run against the internal _smoke council (1 persona, 1 round, no
# synthesis), no model override so the production default is exercised.
on:
  workflow_run:
    workflows: [CD]
    types: [completed]
    branches: [main]

jobs:
  smoke:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    env:
      BASE_URL: https://ahwa.app
      COUNCIL_ID: _smoke
      TIMEOUT_SECONDS: 180

    steps:
      - name: Create smoke-test table
        id: create
        run: |
          response=$(curl -fsS -X POST "$BASE_URL/api/tables" \
            -H "Content-Type: application/json" \
            --data '{"dilemma":"Smoke test: does the deliberation loop work end-to-end?","councilId":"'"$COUNCIL_ID"'"}')
          echo "tableId=$(echo "$response" | jq -r .tableId)" >> "$GITHUB_OUTPUT"
          echo "partyId=$(echo "$response" | jq -r .partyId)" >> "$GITHUB_OUTPUT"
          echo "token=$(echo "$response" | jq -r .token)" >> "$GITHUB_OUTPUT"

      - name: Run the deliberation via SSE
        env:
          TABLE_ID: ${{ steps.create.outputs.tableId }}
          PARTY_ID: ${{ steps.create.outputs.partyId }}
          TOKEN: ${{ steps.create.outputs.token }}
        run: |
          # Consume the SSE stream. Holding the connection open is what
          # keeps the orchestrator running — if curl disconnects, the
          # abort signal fires between rounds. --max-time is a ceiling,
          # not a target; the stream closes naturally when the table
          # completes (emits table_closed).
          curl -fsS -N --max-time "$TIMEOUT_SECONDS" \
            "$BASE_URL/t/$TABLE_ID?party=$PARTY_ID&token=$TOKEN" \
            > /tmp/sse.log || echo "SSE stream ended (may be normal on table_closed)"
          tail -20 /tmp/sse.log

      - name: Verify the table completed
        env:
          TABLE_ID: ${{ steps.create.outputs.tableId }}
        run: |
          response=$(curl -fsS "$BASE_URL/api/tables/$TABLE_ID")
          status=$(echo "$response" | jq -r .status)
          echo "Final status: $status"
          echo "$response" | jq .
          if [ "$status" != "completed" ]; then
            echo "::error::Smoke test failed. Table $TABLE_ID ended in status '$status'."
            exit 1
          fi
