# SPDX-License-Identifier: AGPL-3.0-or-later
name: YunoHost

on:
  pull_request:
    paths:
      - 'packaging/yunohost/**'
      - '.github/workflows/yunohost.yml'
  workflow_dispatch:
    inputs:
      dist:
        description: 'Debian distribution'
        default: 'bookworm'
        type: choice
        options:
          - bookworm
      ynh_branch:
        description: 'YunoHost branch'
        default: 'stable'
        type: choice
        options:
          - stable
          - testing
          - unstable

jobs:
  # Layer 1: package_linter. Static analysis of manifest.toml and scripts/.
  # Fails fast on syntax errors, structure mistakes, deprecated helpers.
  # Runs on every PR touching packaging/yunohost/ (hosted runner — fast).
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Clone package_linter
        run: git clone --depth 1 https://github.com/YunoHost/package_linter.git /tmp/package_linter

      - name: Install linter deps
        run: pip install -r /tmp/package_linter/requirements.txt

      - name: Lint
        run: |
          if [ ! -f packaging/yunohost/manifest.toml ]; then
            echo "::warning::No manifest.toml — skipping linter."
            exit 0
          fi
          set +e
          OUT=$(python3 /tmp/package_linter/package_linter.py packaging/yunohost 2>&1)
          echo "$OUT"
          # The catalog-membership warning is expected until we submit to
          # YunoHost/apps. Any OTHER critical issue (single ✘, not ✘✘✘) is real.
          NON_CATALOG=$(echo "$OUT" | sed 's/\x1b\[[0-9;]*m//g' | grep -E "^\s*✘[^✘]" | wc -l)
          if [ "$NON_CATALOG" -gt 0 ]; then
            echo "::error::$NON_CATALOG non-catalog critical issue(s)"
            exit 1
          fi
          echo "lint: ok (catalog warning expected)"

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck
      - name: ShellCheck packaging/yunohost/scripts
        # SC1091: source files outside the lint scope (_common.sh sources YNH
        # helpers we don't ship). SC2154: vars set by YNH ($app, $domain, etc.).
        run: shellcheck -e SC1091,SC2154 packaging/yunohost/scripts/*

  # Layer 3: package_check. Full integration test — install, remove, upgrade,
  # backup, restore — each in an isolated LXC container on a fresh YunoHost.
  # Requires LXC, which GitHub-hosted runners don't support. Runs on a
  # self-hosted runner registered on a box with LXC (e.g., the test VPS).
  #
  # Triggered manually via "Run workflow" in the Actions tab. Trigger after
  # any non-trivial change to packaging/yunohost/scripts/ — lint can't catch
  # behavioral bugs (e.g., the ProtectHome / data_dir mkdir EACCES from
  # commit cf14343).
  #
  # Runner setup: docs/yunohost-dev.md.
  package-check:
    if: github.event_name == 'workflow_dispatch'
    # Custom label so the VPS runner only picks up THIS job, never random
    # self-hosted work that other workflows might add later. The runner
    # must be registered with --labels package-check on the VPS side.
    runs-on: [self-hosted, package-check]
    needs: lint
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6

      - name: Refresh package_check
        run: |
          if [ ! -d "$HOME/package_check" ]; then
            git clone https://github.com/YunoHost/package_check "$HOME/package_check"
          else
            git -C "$HOME/package_check" pull --ff-only
          fi

      - name: Run package_check (install / remove / upgrade / backup / restore)
        env:
          DIST: ${{ inputs.dist }}
          YNH_BRANCH: ${{ inputs.ynh_branch }}
        run: |
          "$HOME/package_check/package_check.sh" \
            --dist "$DIST" \
            --ynh-branch "$YNH_BRANCH" \
            "$GITHUB_WORKSPACE/packaging/yunohost"

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: package-check-results
          path: |
            **/results.json
            **/summary.png
          if-no-files-found: ignore
